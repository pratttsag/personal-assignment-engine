<!DOCTYPE html>
<html>
<head>
  <title>Personal Automation Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Personal Automation Engine App</h1>

<div>
  <input type="text" id="ruleName" placeholder="Rule Name">

  <select id="triggerType">
    <option value="time">Time Trigger</option>
    <option value="battery">Battery Trigger</option>
    <option value="manual">Manual Trigger</option>
  </select>

  <select id="actionType">
    <option value="alert">Show Alert</option>
    <option value="log">Log Message</option>
  </select>

  <button onclick="addRule()">Add Rule</button>
</div>

<h2>Rules</h2>
<ul id="ruleList"></ul>

<script src="script.js"></script>
</body>
</html>
